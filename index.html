<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Waweru | Frontend Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #00bfff;
            --primary-dark: #009acd;
            --primary-glow: rgba(0, 191, 255, 0.3);
            --bg-color: #0a0a0a;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --text-light: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --header-bg: rgba(0, 0, 0, 0.4);
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --bg-overlay: rgba(255, 255, 255, 0.85);
            --text-color: #1a1a2e;
            --text-muted: rgba(0, 0, 0, 0.5);
            --text-light: rgba(0, 0, 0, 0.75);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.1);
            --header-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        html { scroll-behavior: smooth; }

        body {
            min-height: 100vh;
            color: var(--text-color);
            background: var(--bg-color);
            background-image: url('IMG-20260518-WA0012.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .overlay {
            background: var(--bg-overlay);
            min-height: 100vh;
            backdrop-filter: blur(3px);
            transition: background 0.5s ease;
        }

        header {
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header .logo { font-size: 1.8rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
        nav { display: flex; gap: 30px; align-items: center; flex-wrap: wrap; }
        nav a { color: var(--text-color); text-decoration: none; font-weight: 500; position: relative; transition: 0.3s; }
        nav a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--primary); transition: 0.3s; }
        nav a:hover { color: var(--primary); }
        nav a:hover::after { width: 100%; }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .theme-toggle:hover { background: var(--primary); color: #000; transform: rotate(30deg); }

        /* ===== HERO SECTION WITH ANIMATION ===== */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            padding: 80px 8%;
            min-height: 85vh;
            flex-wrap: wrap;
            position: relative;
        }

        .hero-image img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 40px var(--primary-glow);
            transition: 0.5s;
            z-index: 2;
            position: relative;
        }
        .hero-image img:hover { transform: scale(1.05); }

        .hero-content {
            max-width: 600px;
            position: relative;
            z-index: 2;
        }

        /* ===== ANIMATION: Pull message from right to center ===== */
        .animated-message {
            position: absolute;
            right: -100%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 40px var(--primary-glow);
            opacity: 0;
            animation: pullFromRight 4s ease-in-out infinite;
            white-space: nowrap;
            z-index: 1;
        }

        @keyframes pullFromRight {
            0% {
                right: -100%;
                opacity: 0;
                transform: translateY(-50%) scale(0.5);
            }
            20% {
                right: 10%;
                opacity: 1;
                transform: translateY(-50%) scale(1);
            }
            40% {
                right: 5%;
                opacity: 1;
                transform: translateY(-50%) scale(1.1) rotate(-2deg);
            }
            60% {
                right: 10%;
                opacity: 1;
                transform: translateY(-50%) scale(1) rotate(0deg);
            }
            80% {
                right: 20%;
                opacity: 0.8;
                transform: translateY(-50%) scale(0.9);
            }
            100% {
                right: -100%;
                opacity: 0;
                transform: translateY(-50%) scale(0.5);
            }
        }

        .hero-content h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            color: var(--text-color); 
            line-height: 1.1; 
        }
        .hero-content h2 { 
            font-size: 1.8rem; 
            color: var(--primary); 
            font-weight: 400; 
        }
        .hero-content p { 
            font-size: 1.1rem; 
            line-height: 1.8; 
            color: var(--text-light); 
        }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: var(--primary-dark); transform: translateY(-3px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-outline { background: transparent; border: 2px solid var(--glass-border); color: var(--text-color); }
        .btn-outline:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* ===== FLOATING WHATSAPP BUTTON ===== */
        .floating-whatsapp {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: #25D366;
            color: #fff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            z-index: 999;
            text-decoration: none;
            transition: 0.3s;
        }
        .floating-whatsapp:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.6);
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--primary-glow);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 998;
        }
        .back-to-top.visible { opacity: 1; visibility: visible; }
        .back-to-top:hover { transform: translateY(-5px); }

        footer { text-align: center; padding: 30px; border-top: 1px solid var(--glass-border); color: var(--text-muted); }
        footer span { color: var(--primary); }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 15px 5%; }
            nav { gap: 15px; justify-content: center; }
            .hero { padding: 50px 5%; gap: 30px; }
            .hero-content h1 { font-size: 2.5rem; }
            .hero-image img { width: 160px; height: 160px; }
            .animated-message { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <div class="logo">MW.</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="cv.html">CV</a>
                <a href="projects.html">Projects</a>
                <a href="services.html">Services</a>
                <a href="testimonials.html">Testimonials</a>
                <a href="contact.html">Contact</a>
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            </nav>
        </header>

        <section class="hero">
            <!-- Animated Message that pulls from right to center -->
            <div class="animated-message">
                🚀 Welcome!
            </div>

            <div class="hero-image">
                <img src="Snapchat-595034578.jpg" alt="Michael Waweru">
            </div>
            <div class="hero-content">
                <h1>Michael Waweru</h1>
                <h2>Frontend Web Developer</h2>
                <p>
                    Passionate Frontend Developer building responsive, user-friendly websites 
                    and web applications with clean, efficient code.
                </p>
                <div class="btn-group">
                    <a href="cv.html" class="btn">View Resume</a>
                    <a href="contact.html" class="btn btn-outline">Contact Me</a>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 <span>Michael Waweru</span> | Frontend Developer</p>
        </footer>
    </div>

    <!-- ===== FLOATING WHATSAPP BUTTON ===== -->
    <a href="https://wa.me/254111498830" target="_blank" class="floating-whatsapp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeIcon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.className = 'fas fa-sun';
        }

        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 300);
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
